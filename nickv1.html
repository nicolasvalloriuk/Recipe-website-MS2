<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MealDB Example</title>
  </head>
  <body>
    <h1>Meal Search Result</h1>

    <form id="meal-search-form">
      <label for="meal-search">Search for a meal or ingredient:</label>
      <input
        type="text"
        id="meal-search"
        placeholder="Example: carrot"
        required
      />
      <button type="submit">Search</button>
    </form>

    <div id="meal-result"></div>

    <script>
      const form = document.getElementById("meal-search-form");
      const searchInput = document.getElementById("meal-search");
      const resultDiv = document.getElementById("meal-result");

      async function getMeal(mealName) {
        const url = `https://www.themealdb.com/api/json/v1/1/search.php?s=${mealName}`;

        try {
          resultDiv.innerHTML = "<p>Loading...</p>";

          const response = await fetch(url);

          if (!response.ok) {
            throw new Error("Could not fetch meal data");
          }

          const data = await response.json();

          console.log(data);

          if (data.meals === null) {
            resultDiv.innerHTML = `<p>No meals found for "${mealName}".</p>`;
            return;
          }

          const meal = data.meals[0];

          resultDiv.innerHTML = `
            <h2>${meal.strMeal}</h2>
            <p><strong>Category:</strong> ${meal.strCategory}</p>
            <p><strong>Area:</strong> ${meal.strArea}</p>
            <img src="${meal.strMealThumb}" alt="${meal.strMeal}" width="300">
            <h3>Instructions</h3>
            <p>${meal.strInstructions}</p>
          `;
        } catch (error) {
          console.error(error);
          resultDiv.innerHTML =
            "<p>Something went wrong while loading the meal.</p>";
        }
      }

      form.addEventListener("submit", function (event) {
        event.preventDefault();

        const userSearch = searchInput.value.trim();

        if (userSearch === "") {
          resultDiv.innerHTML = "<p>Please enter a search term.</p>";
          return;
        }

        getMeal(userSearch);
      });
    </script>
  </body>
</html>
